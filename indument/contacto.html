<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | INDUMENT</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo"><h1>INDU<span>MENT</span></h1></div>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="nosotros.html">Nosotros</a></li>
                    <li><a href="contacto.html" class="active">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h2 class="titulo-seccion" style="text-align:center;">Hablemos de su Proyecto</h2>
        
        <div class="form-sencillo">
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="rut">RUT Cliente</label>
                    <input type="text" id="rut" name="rut" class="form-input" placeholder="12.345.678-9" required>
                </div>

                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" class="form-input" placeholder="Juan Pérez" required>
                </div>

                <div class="form-group">
                    <label for="empresa">Nombre de la Empresa</label>
                    <input type="text" id="empresa" name="empresa" class="form-input" placeholder="Empresa S.A.">
                </div>

                <div class="form-group">
                    <label>Tipo de Solicitud</label>
                    <div class="options-group">
                        <label><input type="radio" name="tipo" value="cotizacion" checked> Cotización</label>
                        <label><input type="radio" name="tipo" value="consulta"> Consulta</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="comentario">Comentario</label>
                    <textarea id="comentario" name="comentario" class="form-input" rows="4" placeholder="Detalles del servicio..." required></textarea>
                </div>

                <div class="form-group" style="display:flex; gap:10px; align-items:center;">
                    <input type="checkbox" id="notif" name="notif" value="si">
                    <label for="notif" style="margin-bottom:0; text-transform:none; font-weight:normal;">Deseo recibir notificaciones</label>
                </div>

                <button type="submit" class="btn btn-block">Enviar Mensaje</button>
            </form>
        </div>
    </main>

    <footer><p>&copy; 2026 INDUMENT. Todos los derechos reservados.</p></footer>

</body>
</html>
